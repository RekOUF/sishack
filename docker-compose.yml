version: "3.8"

services:
  sishack:
    build: .
    container_name: sishack
    restart: unless-stopped
    network_mode: host
    environment:
      - SISELI_ACCOUNT=your_siseli_account
      - SISELI_PASSWORD=your_siseli_password
      - HA_URL=http://your_ha_ip:8123
      - HA_TOKEN=your_ha_long_lived_token
      - INTERVAL_MINUTES=5
